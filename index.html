<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Aavishkar 2026 | Annual Day & Fest</title>
  <!-- Google Fonts & Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  
</head>
<body>
  <video class="video-background" autoplay muted loop playsinline>
    <!-- College ambiance video (royalty free mixkit - students walking on campus) -->
    <source src="assets/Ashoka.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <div class="overlay"></div>

  <div class="main-container">
    <div class="hero">
      <h1>✨ AAVISHKAR 2026 ✨</h1>
      <div class="date">23rd March – 29th March 2026</div>
      <div class="tagline">Celebrate | Compete | Create | Innovate</div>
    </div>

    <!-- EVENT CATEGORIES SHOWCASE (with quick register triggers) -->
    <div class="section-title"><i class="fas fa-calendar-alt"></i> Events & Categories</div>
    <div id="eventsContainer" class="events-grid"></div>

    <!-- REGISTRATION PANEL -->
    <div class="register-panel" id="registerPanel">
      <div class="form-title"><i class="fas fa-id-card"></i> Student Registration</div>
      <div class="reg-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="e.g. Aryan Sharma" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Email ID</label>
          <input type="email" id="regEmail" placeholder="student@college.edu">
        </div>
        <div class="form-group">
          <label>Phone No.</label>
          <input type="tel" id="regPhone" placeholder="9876543210">
        </div>
        <div class="form-group">
          <label>Event Category</label>
          <select id="regCategory"></select>
        </div>
        <div class="form-group">
          <label>Select Event</label>
          <select id="regEvent"></select>
        </div>
        <button class="btn-register" id="submitRegistration"><i class="fas fa-check-circle"></i> Register Now</button>
      </div>

      <div class="registered-list">
        <h3><i class="fas fa-users"></i> Registered Participants</h3>
        <div id="registrationsTable" class="reg-table">
          <!-- dynamic table -->
          <table>
            <thead>
              <tr><th>Name</th><th>Email</th><th>Event</th><th>Category</th><th>Action</th></tr>
            </thead>
            <tbody id="regTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <footer>© Aavishkar 2026 | Celebrate the spirit of innovation & culture</footer>
  </div>
  <script src="script.js"></script>

</body>
</html>
